id = "OFL-1.1"
name = "SIL Open Font License 1.1"
url = "https://spdx.org/licenses/OFL-1.1.html"

[terms]
requires_attribution = false
requires_license_notice = true
requires_source_disclosure = false
derivatives = "share-alike"
requires_modification_notice = false
allows_commercial_use = true
allows_redistribution = true
manual_review = true

# OFL also reserves font names via the "Reserved Font Name" clause — a narrow
# restriction on renaming derivatives that the boolean grid cannot express.
# Surfacable via `notes` if a specific font declares an RFN.
