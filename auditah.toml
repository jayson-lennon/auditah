# auditah project config. The tool's own repo has no third-party assets;
# everything is first-party Rust source excluded from audit.
commercial_project = true

exclude = [
    "src/**",
    "tests/**",
    "target/**",
    "examples/**",
    "benches/**",
    "*.rs",
    "*.toml",
    "*.md",
    "*.lock",
    ".gitignore",
    ".git/**",
    ".plans/**",
]
